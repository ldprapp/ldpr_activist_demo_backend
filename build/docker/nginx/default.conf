server {
    listen 80;
    server_name aktivist.pro www.aktivist.pro _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name aktivist.pro www.aktivist.pro _;

    ssl_certificate /etc/letsencrypt/live/aktivist.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aktivist.pro/privkey.pem;

    # UploadedImageReader allows up to 10 MiB for image payloads.
    # Leave some headroom for multipart/form-data overhead.
    client_max_body_size 12m;

    location = /health {
        proxy_pass http://api:8080/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /version {
        proxy_pass http://api:8080/api/v1/version;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}