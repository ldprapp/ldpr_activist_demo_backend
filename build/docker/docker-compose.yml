name: ldpr_activist_demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  postgres-backup:
    image: postgres:16-alpine
    user: "0:0"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      BACKUP_ROOT_PATH_CONTAINER: ${DB_BACKUP_ROOT_PATH_CONTAINER}
      BACKUP_INTERVAL_SECONDS: ${DB_BACKUP_INTERVAL_SECONDS}
      BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS}
      BACKUP_FILE_PREFIX: ${DB_BACKUP_FILE_PREFIX}
      BACKUP_ENVIRONMENT_NAME: ${BACKUP_ENVIRONMENT_NAME}
    volumes:
      - "${DB_BACKUP_ROOT_PATH_HOST}:${DB_BACKUP_ROOT_PATH_CONTAINER}"
      - "./scripts:/scripts:ro"
    entrypoint:
      - /bin/sh
      - -c
      - "tr -d '\\r' < \"${POSTGRES_BACKUP_LOOP_SCRIPT_PATH}\" | /bin/sh"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: ${API_IMAGE_NAME}:${API_IMAGE_TAG}
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080

      # .NET configuration via env vars
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      Swagger__Enabled: ${SWAGGER_ENABLED}

      Otp__TtlSeconds: ${OTP_TTL_SECONDS}
      Otp__Length: ${OTP_LENGTH}
      SmsRu__ApiId: ${SMS_RU_API_ID}
      SmsRu__IsTestMode: ${SMS_RU_IS_TEST_MODE}
      SmsRu__BaseUrl: ${SMS_RU_BASE_URL}

      RateLimiting__Enabled: ${RATE_LIMITING_ENABLED}
      RateLimiting__PublicAuthentication__PermitLimit: ${RATE_LIMITING_PUBLIC_AUTHENTICATION_PERMIT_LIMIT}
      RateLimiting__PublicAuthentication__WindowSeconds: ${RATE_LIMITING_PUBLIC_AUTHENTICATION_WINDOW_SECONDS}
      RateLimiting__PublicAuthentication__QueueLimit: ${RATE_LIMITING_PUBLIC_AUTHENTICATION_QUEUE_LIMIT}
      RateLimiting__PublicOtpConfirmation__PermitLimit: ${RATE_LIMITING_PUBLIC_OTP_CONFIRMATION_PERMIT_LIMIT}
      RateLimiting__PublicOtpConfirmation__WindowSeconds: ${RATE_LIMITING_PUBLIC_OTP_CONFIRMATION_WINDOW_SECONDS}
      RateLimiting__PublicOtpConfirmation__QueueLimit: ${RATE_LIMITING_PUBLIC_OTP_CONFIRMATION_QUEUE_LIMIT}
      RateLimiting__AuthenticatedMutation__PermitLimit: ${RATE_LIMITING_AUTHENTICATED_MUTATION_PERMIT_LIMIT}
      RateLimiting__AuthenticatedMutation__WindowSeconds: ${RATE_LIMITING_AUTHENTICATED_MUTATION_WINDOW_SECONDS}
      RateLimiting__AuthenticatedMutation__QueueLimit: ${RATE_LIMITING_AUTHENTICATED_MUTATION_QUEUE_LIMIT}

      FirebasePush__Enabled: ${FIREBASE_PUSH_ENABLED}
      FirebasePush__BaseUrl: ${FIREBASE_PUSH_BASE_URL}
      FirebasePush__ProjectId: ${FIREBASE_PUSH_PROJECT_ID}
      FirebasePush__ServiceAccountJsonPath: ${FIREBASE_PUSH_SERVICE_ACCOUNT_JSON_PATH}

      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE}
      ApplicationTime__Locale: ${APPLICATION_TIME_LOCALE}

      StructuredLogging__ServiceName: ${STRUCTURED_LOGGING_SERVICE_NAME}
      StructuredLogging__ServiceNamespace: ${STRUCTURED_LOGGING_SERVICE_NAMESPACE}
      StructuredLogging__InstanceId: ${STRUCTURED_LOGGING_INSTANCE_ID}
      StructuredLogging__MinimumLevel__Default: ${STRUCTURED_LOGGING_MIN_LEVEL_DEFAULT}
      StructuredLogging__MinimumLevel__Microsoft: ${STRUCTURED_LOGGING_MIN_LEVEL_MICROSOFT}
      StructuredLogging__MinimumLevel__MicrosoftAspNetCore: ${STRUCTURED_LOGGING_MIN_LEVEL_MICROSOFT_ASPNETCORE}
      StructuredLogging__MinimumLevel__MicrosoftEntityFrameworkCore: ${STRUCTURED_LOGGING_MIN_LEVEL_MICROSOFT_ENTITYFRAMEWORKCORE}
      StructuredLogging__MinimumLevel__System: ${STRUCTURED_LOGGING_MIN_LEVEL_SYSTEM}
      StructuredLogging__Console__Enabled: ${STRUCTURED_LOGGING_CONSOLE_ENABLED}
      StructuredLogging__Files__Enabled: ${STRUCTURED_LOGGING_FILES_ENABLED}
      StructuredLogging__Files__RootPath: ${STRUCTURED_LOGGING_FILES_ROOT_PATH_CONTAINER}
      StructuredLogging__Files__Shared: ${STRUCTURED_LOGGING_FILES_SHARED}
      StructuredLogging__Files__FileSizeLimitBytes: ${STRUCTURED_LOGGING_FILES_FILE_SIZE_LIMIT_BYTES}
      StructuredLogging__Files__RollOnFileSizeLimit: ${STRUCTURED_LOGGING_FILES_ROLL_ON_FILE_SIZE_LIMIT}
      StructuredLogging__Files__RetainedFileCountLimit: ${STRUCTURED_LOGGING_FILES_RETAINED_FILE_COUNT_LIMIT}
      StructuredLogging__Files__DateSinkMapCountLimit: ${STRUCTURED_LOGGING_FILES_DATE_SINK_MAP_COUNT_LIMIT}
      StructuredLogging__Files__LevelSinkMapCountLimit: ${STRUCTURED_LOGGING_FILES_LEVEL_SINK_MAP_COUNT_LIMIT}

      # entrypoint target
      APP_DLL: ${APP_DLL}

    expose:
      - "8080"
    volumes:
      - "${STRUCTURED_LOGGING_FILES_ROOT_PATH_HOST}:${STRUCTURED_LOGGING_FILES_ROOT_PATH_CONTAINER}"
      - "./secrets:/run/secrets/firebase:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_started
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
