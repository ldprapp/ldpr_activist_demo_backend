name: ldpr_activist_demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT_PUBLIC}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT_PUBLIC}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile
      args:
        DOTNET_VERSION: ${DOTNET_VERSION}
        APP_PROJECT: ${APP_PROJECT}
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      # .NET configuration via env vars
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}

      Otp__TtlSeconds: ${OTP_TTL_SECONDS}
      Otp__Length: ${OTP_LENGTH}
      SmsRu__ApiId: ${SMS_RU_API_ID}
      SmsRu__IsTestMode: ${SMS_RU_IS_TEST_MODE}
      SmsRu__BaseUrl: ${SMS_RU_BASE_URL}

      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE}
      ApplicationTime__Locale: ${APPLICATION_TIME_LOCALE}

      StructuredLogging__ServiceName: ${STRUCTURED_LOGGING_SERVICE_NAME}
      StructuredLogging__ServiceNamespace: ${STRUCTURED_LOGGING_SERVICE_NAMESPACE}
      StructuredLogging__InstanceId: ${STRUCTURED_LOGGING_INSTANCE_ID}
      StructuredLogging__MinimumLevel__Default: ${STRUCTURED_LOGGING_MIN_LEVEL_DEFAULT}
      StructuredLogging__MinimumLevel__Microsoft: ${STRUCTURED_LOGGING_MIN_LEVEL_MICROSOFT}
      StructuredLogging__MinimumLevel__MicrosoftAspNetCore: ${STRUCTURED_LOGGING_MIN_LEVEL_MICROSOFT_ASPNETCORE}
      StructuredLogging__MinimumLevel__MicrosoftEntityFrameworkCore: ${STRUCTURED_LOGGING_MIN_LEVEL_MICROSOFT_ENTITYFRAMEWORKCORE}
      StructuredLogging__MinimumLevel__System: ${STRUCTURED_LOGGING_MIN_LEVEL_SYSTEM}
      StructuredLogging__Console__Enabled: ${STRUCTURED_LOGGING_CONSOLE_ENABLED}
      StructuredLogging__Files__Enabled: ${STRUCTURED_LOGGING_FILES_ENABLED}
      StructuredLogging__Files__RootPath: ${STRUCTURED_LOGGING_FILES_ROOT_PATH_CONTAINER}
      StructuredLogging__Files__Shared: ${STRUCTURED_LOGGING_FILES_SHARED}
      StructuredLogging__Files__FileSizeLimitBytes: ${STRUCTURED_LOGGING_FILES_FILE_SIZE_LIMIT_BYTES}
      StructuredLogging__Files__RollOnFileSizeLimit: ${STRUCTURED_LOGGING_FILES_ROLL_ON_FILE_SIZE_LIMIT}
      StructuredLogging__Files__RetainedFileCountLimit: ${STRUCTURED_LOGGING_FILES_RETAINED_FILE_COUNT_LIMIT}
      StructuredLogging__Files__DateSinkMapCountLimit: ${STRUCTURED_LOGGING_FILES_DATE_SINK_MAP_COUNT_LIMIT}
      StructuredLogging__Files__LevelSinkMapCountLimit: ${STRUCTURED_LOGGING_FILES_LEVEL_SINK_MAP_COUNT_LIMIT}

      # entrypoint target
      APP_DLL: ${APP_DLL}

    ports:
      - "${API_PORT}:8080"
    volumes:
      - "${STRUCTURED_LOGGING_FILES_ROOT_PATH_HOST}:${STRUCTURED_LOGGING_FILES_ROOT_PATH_CONTAINER}"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
